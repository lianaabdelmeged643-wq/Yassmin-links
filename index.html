<script>

function convert() {
  let url = document.getElementById("link").value.trim();

  if(!url){
    document.getElementById("result").innerText = "";
    return;
  }

  if(!url.includes("amazon.eg")){
    document.getElementById("result").innerText = "❌ اللينك مش أمازون";
    return;
  }

  // 🧹 نشيل التاج القديم فقط
  url = url.replace(/tag=[^&]*/g, '');

  // 🧹 تنظيف & زيادة
  url = url.replace(/[?&]+$/, '');

  let newLink;

  // 🟢 منتج
  if(url.includes("/dp/") || url.includes("/gp/product/")){
    let id;

    if(url.includes("/dp/")){
      id = url.split("/dp/")[1].split("/")[0];
    } else {
      id = url.split("/gp/product/")[1].split("/")[0];
    }

    newLink = "https://www.amazon.eg/dp/" + id + "/?tag=offers201508-21";
  }

  // 🟣 بحث (مهم نحافظ عليه)
  else if(url.includes("/s?")){
    if(url.includes("?")){
      newLink = url + "&tag=offers201508-21";
    } else {
      newLink = url + "?tag=offers201508-21";
    }
  }

  // 🔵 عرض أو أي صفحة
  else {
    let base = url.split("?")[0];

    if(url.includes("?")){
      newLink = base + "?tag=offers201508-21";
    } else {
      newLink = base + "?tag=offers201508-21";
    }
  }

  document.getElementById("result").innerText = newLink;
}

</script>
